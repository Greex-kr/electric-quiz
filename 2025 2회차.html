    let currentIdx = 0;
    let isWaiting = false;

    function showQuestion() {
        isWaiting = false;
        const q = quizData[currentIdx];
        document.getElementById('progress').innerText = (currentIdx + 1) + " / 100";
        document.getElementById('questionText').innerHTML = q.q;
        const optionsBox = document.getElementById('optionsBox');
        optionsBox.innerHTML = "";
        q.options.forEach((opt, index) => {
            const btn = document.createElement('button');
            btn.className = "option-btn";
            btn.innerHTML = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optionsBox.appendChild(btn);
        });
        if(window.MathJax) { MathJax.typesetPromise(); }
    }

    function checkAnswer(selectedIndex, btnElement) {
        if (isWaiting) return;
        isWaiting = true;
        const q = quizData[currentIdx];
        const buttons = document.querySelectorAll('.option-btn');
        buttons.forEach(btn => btn.disabled = true);
        if (selectedIndex === q.a) { btnElement.classList.add("correct"); } 
        else { btnElement.classList.add("wrong"); buttons[q.a].classList.add("correct"); }
        setTimeout(nextQuestion, 500); // 0.5초 속도
    }

    function jumpToQuestion() {
        const input = document.getElementById('jumpInput');
        const num = parseInt(input.value);
        const targetIdx = num - 1; // 시작 번호에 맞춰 계산
        if (targetIdx >= 0 && targetIdx < quizData.length) {
            currentIdx = targetIdx;
            showQuestion();
            input.value = "";
        } else { alert("1~100 사이 번호를 넣어주세요!"); }
    }

    function nextQuestion() {
        currentIdx++;
        if (currentIdx < quizData.length) { showQuestion(); } 
        else { alert("2회차 종료! 3회차로 넘어가실까요?"); currentIdx = 0; showQuestion(); }
    }
    showQuestion();
