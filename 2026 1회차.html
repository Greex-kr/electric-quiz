        { n: 93, q: "시가지 시설하는 154[kV] 가공전선로에는 지락 또는 단락이 생겼을 때에는 몇 초 이내 자동적으로 이를 전로로부터 차단하는 장치를 시설해여야 하는가?", a: 1, o: ["1", "2", "3", "5"]
 },
        { n: 94, q: "특고압 가공전선로에서 전선로 중 \\(3^\\circ\\)를 초과하는 수평각도를 이루는 곳에 사용하는 철탑 종류는?", a: 4, o: ["직선형", "보강형", "잡아 당김형", "각도형"] 
},
        { n: 95, q: "폭연성 먼지가 존재하는 장소에서 전기설비가 발화원이 되어 폭발할 우려가 있는 곳에서의 저압 옥내배선 공사로 옳은 것은?", a: 1, o: ["금속관 공사", "합성수지관 공사", "애자사용 공사", "캡타이어 케이블 공사"]
 },
        { n: 96, q: "지중전선로를 직접 매설식에 의하여 차량 기타 중량물의 압력을 받을 우려가 있는 장소에 시설할 경우에는 매설 깊이는 최소 몇 \\([m]\\) 이상인가?", a: 1, o: ["1.0", "1.2", "1.5", "1.8"]
 },
        { n: 97, q: "저압가공선과 고압 가공 절연전선을 동일 지지물에 시설하는 경우 두 전선 사이 간격은 몇 \\([m]\\) 이상인가?<br>(단, 각도주 분기주 등에서 혼촉의 우려가 없도록 시설하는 경우가 아니다.)", a: 1, o: ["0.5", "0.6", "0.7", "0.8"]
 },
        { n: 98, q: "고압 및 특고압의 전로에 시설하는 피뢰기 접지 저항 값은 몇 \\([\\Omega]\\) 이하로 하여야 하는가?<br>(단, 주어지지 않은 조건은 고려하지 않는다.)", a: 1, o: ["10", "20", "30", "50"]
 },
        { n: 99, q: "건조물과 전차선,급전선 및 전기철도차량 집전장치의 공기의 절연 간격은 아래와 같이 정적 및 동적 최소 절연간격 이상을 확보하여야 한다. ( )에 들어갈 전압\\([V]\\)은?", img:"2026(99).png", a: 1, o: ["750", "1,000", "2,000", "1,500"]

        { n: 100, q: "전력보안통신설비 전원공급기 시설에 대한 설명으로 틀린 것은?", a: 1, o: ["기기주, 변압기 전주 및 분주기 등 설비 복잡개소에는 시설해야 한다", "전원공급기는 지상에서 4[m] 이상으로 유지하여야한다", "전원공급기 시설 시 통신사업자는 기기 전면에 명판을 부착해야 한다.", "전원공급기의 시설방향은 인도측으로 시설하여 외함은 접지를 사행해야 한다"]
 }
    ];

let currentIdx = 0;

    function renderQuestion() {
        const q = questions[currentIdx];
        
        // 그림 설정
       const imgHtml = q.img ? `<img src="${q.img}" style="width:300px; height:200px; object-fit: contain; display:block; margin:10px auto; border: 1px solid #ddd; border-radius: 8px; background-color: #fff;">` : '';
        const html = `
            <div class="question-card">
                <span class="q-number">Q${q.n}. 2026년 1회</span>
                <p>${q.q}</p>
                ${imgHtml}
                <div class="options">
                    ${q.o.map((opt, i) => `
                        <div class="option" id="opt-${i + 1}" onclick="checkAnswer(${i + 1}, this)">
                            ${i + 1}. ${opt}
                        </div>
                    `).join('')}
                </div>
            </div>
            <div style="display:flex; justify-content:center; gap:10px;">
                <button onclick="prevQ()" class="nav-btn">이전</button>
                <button onclick="nextQ()" class="nav-btn">다음</button>
            </div>
        `;

        document.getElementById('questionArea').innerHTML = html;
        
        if (typeof MathJax !== 'undefined') {
            MathJax.typeset();
        }
    }

    function checkAnswer(userAns) {
        const correctAns = questions[currentIdx].a;
        
        // 정답과 오답의 '이름표'를 찾습니다.
        const selectedOption = document.getElementById(`opt-${userAns}`);
        const correctOption = document.getElementById(`opt-${correctAns}`);

        if (userAns === correctAns) {
            // 정답일 때 초록색
            if(selectedOption) selectedOption.classList.add('correct');
        } else {
            // 틀렸을 때 빨간색 + 정답은 초록색으로 표시
            if(selectedOption) selectedOption.classList.add('wrong');
            if(correctOption) correctOption.classList.add('correct');
        }

        // 현우님 요청대로 0.5초 뒤 다음 문제로!
        setTimeout(nextQ, 500);
    }

    function nextQ() {
        if (currentIdx < questions.length - 1) {
            currentIdx++;
            renderQuestion();
        } else {
            alert("마지막 문제 완료! 고생하셨습니다, 현우 님.");
        }
    }

    function prevQ() {
        if (currentIdx > 0) {
            currentIdx--;
            renderQuestion();
        }
    }

    function jumpToQuestion() {
        const num = parseInt(document.getElementById('jumpTarget').value);
        if (num >= 1 && num <= 100) {
            currentIdx = num - 1;
            renderQuestion();
        }
    }

    renderQuestion();
</script>
